name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'overrides/**'
      - 'hooks/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CONCEPTS.md'
      - 'BEST_PRACTICES.md'
      - 'INDEX.md'
      - 'ROADMAP.md'
      - 'codeupipe/connect/extension/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs + Material
        run: pip install mkdocs-material

      # Root .md → docs/ sync is handled by hooks/sync_docs.py (on_pre_build).
      # Blueprint and deploy-guide files already live in docs/.
      # No manual copy step needed.

      - name: Build site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
