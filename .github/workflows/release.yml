name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ── Gate: full test matrix must pass before publishing ──
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e .

      - name: Test suite
        run: python -m pytest --tb=short -q

      - name: Lint
        run: cup lint codeupipe

      - name: Doc freshness
        run: cup doc-check .

      - name: CLI smoke
        run: |
          cup list
          cup report codeupipe

  # ── Build sdist + wheel ──
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          cup list
          python -c "import codeupipe; print(f'Built codeupipe {codeupipe.__version__}')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI ──
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
