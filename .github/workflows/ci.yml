name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Debug git env
        run: |
          echo "=== git version ==="
          git --version
          echo "=== GIT_* env vars ==="
          env | grep -i "^GIT_" || echo "none"
          echo "=== safe.directory ==="
          git config --global --get-all safe.directory 2>/dev/null || echo "not set"

      - name: Run tests
        run: python -m pytest --tb=long -q -s

      - name: Lint components
        run: |
          cup lint codeupipe/core
          cup lint codeupipe/utils
          cup lint codeupipe/converter
          cup lint codeupipe/linter

      - name: Doc freshness check
        run: cup doc-check .

      - name: CLI smoke test
        run: |
          cup list
          cup report codeupipe
          python -c "import codeupipe; print(f'codeupipe {codeupipe.__version__}')"
