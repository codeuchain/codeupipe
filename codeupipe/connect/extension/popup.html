<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    padding: 16px;
  }
  h1 { font-size: 14px; color: #58a6ff; margin-bottom: 12px; }
  .tier-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 600;
    margin-bottom: 12px;
  }
  .tier-native { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
  .tier-http { background: rgba(88,166,255,0.15); color: #58a6ff; border: 1px solid #58a6ff; }
  .tier-wasm { background: rgba(139,148,158,0.15); color: #8b949e; border: 1px solid #8b949e; }
  .tier-disconnected { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid #f85149; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .row .label { color: #8b949e; }
  .row .value { color: #c9d1d9; font-weight: 500; }
  .caps { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .cap {
    padding: 2px 8px; border-radius: 4px; font-size: 10px;
    background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.3);
  }
  .actions { margin-top: 12px; display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 6px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; font-size: 11px; cursor: pointer;
    text-align: center;
  }
  .btn:hover { background: #30363d; }
  .btn-primary { background: #238636; border-color: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  hr { border: none; border-top: 1px solid #21262d; margin: 12px 0; }
  #status-msg { font-size: 11px; color: #8b949e; margin-top: 8px; }
</style>
</head>
<body>
  <h1>🦴 CUP Platform Bridge</h1>

  <div id="tier-badge" class="tier-badge tier-disconnected">
    🔴 Checking...
  </div>

  <div id="details">
    <div class="row"><span class="label">Device</span><span class="value" id="device">—</span></div>
    <div class="row"><span class="label">Tier</span><span class="value" id="tier">—</span></div>
    <div class="row"><span class="label">Native</span><span class="value" id="native">—</span></div>
    <div class="row"><span class="label">HTTP</span><span class="value" id="http">—</span></div>
    <div class="row"><span class="label">Port</span><span class="value" id="port">—</span></div>
  </div>

  <div id="caps" class="caps"></div>

  <hr>

  <div class="actions">
    <button class="btn btn-primary" id="btn-probe">🔄 Probe</button>
    <button class="btn" id="btn-platform">🌐 Platform</button>
  </div>

  <div id="status-msg"></div>

<script>
  const TIER_DISPLAY = {
    'extension-native': { icon: '🟢', label: 'Native GPU', cls: 'tier-native' },
    'extension-http':   { icon: '🟢', label: 'HTTP Bridge', cls: 'tier-http' },
    'wasm':             { icon: '🟡', label: 'WASM Only', cls: 'tier-wasm' },
    'disconnected':     { icon: '🔴', label: 'Disconnected', cls: 'tier-disconnected' },
  };

  function updateUI(status) {
    const tier = status.tier || 'disconnected';
    const display = TIER_DISPLAY[tier] || TIER_DISPLAY['disconnected'];
    const badge = document.getElementById('tier-badge');
    badge.className = 'tier-badge ' + display.cls;
    badge.textContent = display.icon + ' ' + display.label;

    document.getElementById('device').textContent = status.device || '—';
    document.getElementById('tier').textContent = tier;
    document.getElementById('native').textContent = status.nativeAlive ? '✅ Connected' : '❌ Unavailable';
    document.getElementById('http').textContent = status.httpAlive ? '✅ Connected' : '❌ Unavailable';
    document.getElementById('port').textContent = (status.config && status.config.httpPort) || '8089';

    const capsEl = document.getElementById('caps');
    capsEl.innerHTML = '';
    (status.capabilities || []).forEach(cap => {
      const span = document.createElement('span');
      span.className = 'cap';
      span.textContent = cap;
      capsEl.appendChild(span);
    });

    if (status.lastProbe) {
      const ago = Math.round((Date.now() - status.lastProbe) / 1000);
      document.getElementById('status-msg').textContent = 'Last probe: ' + ago + 's ago';
    }
  }

  // Get initial status
  chrome.runtime.sendMessage({ type: 'cup-request', action: 'status' }, (response) => {
    if (response && response.result) updateUI(response.result);
  });

  // Probe button
  document.getElementById('btn-probe').addEventListener('click', () => {
    document.getElementById('status-msg').textContent = 'Probing...';
    chrome.runtime.sendMessage({ type: 'cup-request', action: 'health' }, () => {
      setTimeout(() => {
        chrome.runtime.sendMessage({ type: 'cup-request', action: 'status' }, (response) => {
          if (response && response.result) updateUI(response.result);
        });
      }, 500);
    });
  });

  // Platform button
  document.getElementById('btn-platform').addEventListener('click', () => {
    chrome.tabs.create({ url: 'https://codeuchain.github.io/cup-platform/' });
  });
</script>
</body>
</html>
